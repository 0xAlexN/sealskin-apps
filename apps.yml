# --- DÉVELOPPEMENT & CYBER ---
- id: "vscodium"
  name: "VSCodium"
  logo: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/vscodium-icon.png"
  url: "https://github.com/linuxserver/docker-vscodium"
  provider: "docker"
  provider_config:
    image: "lscr.io/linuxserver/vscodium:latest"
    port: 3000
    nvidia_support: true
    dri3_support: true
    type: "app"
    autostart: true
    url_support: false
    open_support: true
    extensions:
      - *code_files

- id: "kali-linux"
  name: "Kali Linux"
  logo: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/kali-logo.png"
  url: "https://github.com/linuxserver/docker-kali-linux"
  provider: "docker"
  provider_config:
    image: "lscr.io/linuxserver/kali-linux:latest"
    port: 3000
    nvidia_support: true
    dri3_support: true
    type: "desktop"
    autostart: false
    url_support: false
    open_support: true
    extensions: []

- id: "wireshark"
  name: "Wireshark"
  logo: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/wireshark-icon.png"
  url: "https://github.com/linuxserver/docker-wireshark"
  provider: "docker"
  provider_config:
    image: "lscr.io/linuxserver/wireshark:latest"
    port: 3000
    nvidia_support: false
    dri3_support: true
    type: "app"
    autostart: true
    url_support: false
    open_support: true
    extensions:
      - pcap
      - pcapng
      - cap

- id: "remmina"
  name: "Remmina"
  logo: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/remmina-icon.png"
  url: "https://github.com/linuxserver/docker-remmina"
  provider: "docker"
  provider_config:
    image: "lscr.io/linuxserver/remmina:latest"
    port: 3000
    nvidia_support: true
    dri3_support: true
    type: "app"
    autostart: true
    url_support: false
    open_support: true
    extensions:
      - remmina
      - rdp
      - vnc
