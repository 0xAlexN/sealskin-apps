extension_groups:
  archive_files: &archive_files
    - zip
    - 7z
    - rar
    - tar
    - gz
    - bz2
  code_files: &code_files
    - txt
    - md
    - py
    - js
    - ts
    - html
    - css
    - scss
    - json
    - yaml
    - yml
    - toml
    - xml
    - sh
    - bash
    - java
    - c
    - cpp
    - h
    - cs
    - go
    - rs
    - rb
    - php

apps:
# --- BROWSERS (TOUS) ---
- id: "brave"
  name: "Brave"
  logo: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/brave-logo.png"
  url: "https://github.com/linuxserver/docker-brave"
  provider: "docker"
  provider_config:
    image: "lscr.io/linuxserver/brave:latest"
    port: 3000
    nvidia_support: true
    dri3_support: true
    type: "browser"
    autostart: true
    url_support: true
    open_support: false
    extensions: []

